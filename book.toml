[book]
authors = ["agents-tutorial"]
language = "zh"
src = "src"
title = "AI Agent 开发与 Harness Engineering 实战 (Rust 版)"
description = "从零基础到高级岗位：AI Agent 与 Harness Engineer 企业级开发，配套 mini-claude-code Rust 实战。"

[build]
build-dir = "book"
create-missing = true

[output.html]
default-theme = "navy"
preferred-dark-theme = "navy"
git-repository-url = "https://github.com/zhenbodou/rust_agents"
site-url = "/rust_agents/"
edit-url-template = ""
no-section-label = false
mathjax-support = true

[output.html.fold]
enable = true
level = 1

[output.html.playground]
editable = false
copyable = true
line-numbers = true

[output.html.search]
enable = true
limit-results = 30
use-boolean-and = true
boost-title = 2
